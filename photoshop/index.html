<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Jack Graddon | Photoshop</title>

    <!-- JQuery -->

        integrity="sha256-WpOohJOqMqqyKL9FccASB9O0KwACQJpFTUBLTYOVvVU=" crossorigin="anonymous"></script>
    <!-- jsCookie -->
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@beta/dist/js.cookie.min.js"></script>
    <!-- Bootstrap core CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <!-- Personal CSS -->
    <link href="../css/style.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <nav class="navbar navbar-expand-sm sticky-top bg-light shadow">
        <a class="navbar-brand">
            <img src="../images/favicon.ico" alt="Logo" width="50px">
        </a>
        <div class="navbar-toggler" id="webapp_cover" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <div id="menu_button">
                <input type="checkbox" id="menu_checkbox">
                <label for="menu_checkbox" id="menu_label">
                    <div id="menu_text_bar"></div>
                </label>
            </div>
        </div>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="../">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="../photoshop/">Photoshop</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="../illustrator/">Illustrator</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="../web/">Websites</a>
                </li>
            </ul>
        </div>
    </nav>
    <main role="main" class="container">
        <div class="mt-5">
            <h1>Jack Graddon</h1>
            <p class="lead">Photoshop Portfolio</p>
        </div>
        <br>
        <div>
            <h3>Learning Photoshop</h3>
        </div>
        <div class="jumbotron">
            <div class="d-flex justify-content-center mb-2 btn-toolbar">
                <div class="btn-group">
                    <button id="1" onclick="javascript:img(1)" class="btn btn-primary">1</button>
                    <button id="2" onclick="javascript:img(2)" class="btn btn-secondary">2</button>
                    <button id="3" onclick="javascript:img(3)" class="btn btn-secondary">3</button>
                    <button id="4" onclick="javascript:img(4)" class="btn btn-secondary">4</button>
                    <button id="5" onclick="javascript:img(5)" class="btn btn-secondary">5</button>
                    <button id="6" onclick="javascript:img(6)" class="btn btn-secondary">6</button>
                    <button id="7" onclick="javascript:img(7)" class="btn btn-secondary">7</button>
                    <button id="8" onclick="javascript:img(8)" class="btn btn-secondary">Final</button>
                </div>
            </div>
            <div class="d-flex justify-content-center">
                <img style="width:50%; height: 50%;" id="img" src="ps1.jpg" class="hoverable">
            </div>
            <div class="d-flex justify-content-center mt-1">
                <p class="text-muted" id="bottomText">Made in Graphic Arts I, a course at LHS, in early 2019.</p>
            </div>
        </div>
        <script>
            let lastPress = 1;

            function img(x) {
                $('#' + x).toggleClass('btn-primary');
                $('#' + x).toggleClass('btn-secondary');
                $('#' + lastPress).toggleClass('btn-primary');
                $('#' + lastPress).toggleClass('btn-secondary');
                $('#img').attr("src", "./ps" + x + ".jpg");
                lastPress = x;
            }
        </script>
    </main>
    <nav class="navbar navbar-light bg-light">
        <div style="width: 100%;">
            <p class="lead">Jack Graddon</p>
        </div>
        <div class="row">
            <div class="col-md">
                <h6 class="mb-0">Copyright</h6>
                <p class="text-sm">All work &copy;2021 Jackson Graddon</p>
            </div>
        </div>

    </nav>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous">
        </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous">
        </script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous">
        </script>
</body>

</html>
